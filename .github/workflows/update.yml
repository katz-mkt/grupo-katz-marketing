name: Atualização Semanal Dashboard

on:
  schedule:
    # Domingo 23:59 BRT (UTC-3) = Segunda 02:59 UTC
    - cron: '59 2 * * 1'
  workflow_dispatch:   # permite rodar manualmente pelo GitHub se precisar

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necessário para fazer push de volta ao repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configurar identidade do git
        run: |
          git config user.name  "katz-mkt-bot"
          git config user.email "grupokatzmarketing@gmail.com"

      - name: Buscar dados do Instagram e atualizar dashboard
        run: node update.js
